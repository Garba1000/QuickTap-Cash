<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tap & Earn Safe</title>

<style>
body{
  margin:0;
  padding:20px;
  font-family: Arial;
  background:#0b0b0b;
  color:#fff;
}

h1{font-size:22px}

.section{
  margin-top:18px;
  padding:15px;
  background:#1c1c1c;
  border-radius:10px;
}

.btn{
  display:block;
  margin-top:10px;
  padding:12px;
  background:#f6c445;
  color:#000;
  font-weight:bold;
  text-align:center;
  border-radius:8px;
  cursor:pointer;
}

.btn:active{transform:scale(0.97)}

input,select{
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:6px;
}
</style>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>

</head>

<body>

<h1>⚡ Tap & Earn Safe</h1>

<p>XP Balance: <b id="points">0</b></p>

<!-- TAP -->
<div class="section">
  <h2>🎮 Tap System</h2>
  <div class="btn" id="tapBtn">Tap +1 XP</div>
</div>

<!-- REWARD AD -->
<div class="section">
  <h2>📺 Reward Ad</h2>
  <div class="btn" id="rewardAdBtn">Watch Ad + Bonus XP</div>
</div>

<!-- TASK (1 AD ONLY) -->
<div class="section">
  <h2>🎯 Task Mode</h2>
  <div class="btn" id="startTask">Start Task</div>

  <div id="taskArea" style="display:none;">
    <div class="btn" id="runTaskAd">Watch Task Ad</div>
    <div class="btn" id="finishTask">Finish Task</div>
  </div>
</div>

<!-- DAILY -->
<div class="section">
  <h2>🎁 Daily Bonus</h2>
  <div class="btn" id="dailyBtn">Claim Daily XP</div>
</div>

<!-- WITHDRAW -->
<div class="section">
  <h2>💳 Withdraw</h2>

  <p>Minimum: 10,000 XP</p>

  <select id="method">
    <option>Litecoin</option>
    <option>USDT</option>
    <option>Payeer</option>
    <option>Bank</option>
  </select>

  <input id="address" placeholder="Wallet"/>
  <input id="amount" type="number" placeholder="Amount"/>

  <div class="btn" id="withdrawBtn">Request Withdraw</div>
</div>

<script>
const tg = window.Telegram?.WebApp;
tg?.expand?.();

let xp = parseInt(localStorage.getItem("xp") || "0");
let lastDaily = parseInt(localStorage.getItem("daily") || "0");

function update(){
  document.getElementById("points").innerText = xp;
  localStorage.setItem("xp", xp);
}

/* ======================
   ADSGRAM (SAFE STRUCTURE)
====================== */
let rewardAd, taskAd;

function initAds(){
  if(typeof Adsgram === "undefined") return;

  rewardAd = Adsgram.init({ blockId: "29216" });
  taskAd = Adsgram.init({ blockId: "29216" }); // ONLY ONE TASK AD
}

window.addEventListener("load", initAds);

/* ======================
   TAP SYSTEM
====================== */
let lastTap = 0;

document.getElementById("tapBtn").onclick = () => {
  let now = Date.now();
  if(now - lastTap < 200) return;

  lastTap = now;
  xp += 1;
  update();
};

/* ======================
   REWARD AD
====================== */
document.getElementById("rewardAdBtn").onclick = async () => {
  if(!rewardAd) return alert("Ad not ready");

  try{
    const res = await rewardAd.show();

    if(res?.done){
      xp += 5;
      update();
    }
  }catch(e){}
};

/* ======================
   TASK SYSTEM (SAFE)
====================== */
document.getElementById("startTask").onclick = () => {
  document.getElementById("taskArea").style.display = "block";
};

document.getElementById("runTaskAd").onclick = async () => {
  if(!taskAd) return alert("Task ad not ready");

  try{
    const res = await taskAd.show();

    if(res?.done){
      xp += 3;
      update();
      alert("Task completed!");
    }
  }catch(e){}
};

document.getElementById("finishTask").onclick = () => {
  xp += 5;
  update();
  document.getElementById("taskArea").style.display = "none";
};

/* ======================
   DAILY BONUS
====================== */
document.getElementById("dailyBtn").onclick = () => {
  let now = Date.now();

  if(now - lastDaily < 86400000){
    return alert("Come back tomorrow");
  }

  xp += 20;
  lastDaily = now;
  localStorage.setItem("daily", lastDaily);
  update();
};

/* ======================
   WITHDRAW
====================== */
document.getElementById("withdrawBtn").onclick = () => {
  let amount = parseInt(document.getElementById("amount").value);

  if(!amount || amount < 10000){
    return alert("Minimum withdrawal is 10,000 XP");
  }

  if(xp < amount){
    return alert("Not enough XP");
  }

  console.log({
    method: document.getElementById("method").value,
    address: document.getElementById("address").value,
    amount
  });

  alert("Withdraw request sent");
};

update();
</script>

</body>
</html>
