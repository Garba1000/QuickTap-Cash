<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tap Energy App</title>

<script src="https://sad.adsgram.ai/js/sad.min.js"></script>

<style>
body{
  font-family: Arial;
  text-align:center;
  background:#111;
  color:white;
}
button{
  padding:15px 25px;
  margin:10px;
  font-size:18px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
#tapBtn{
  background:#00c853;
  color:white;
}
#adBtn{
  background:#2962ff;
  color:white;
}
#withdrawBtn{
  background:#ff1744;
  color:white;
}
</style>
</head>

<body>

<h1>🔥 Tap & Earn</h1>

<h2>Points: <span id="points">0</span></h2>
<h3>Energy: <span id="energy">0</span></h3>

<button id="tapBtn">TAP</button>
<br>
<button id="adBtn">Watch Ad (+2 Energy)</button>
<br>
<button id="taskBtn">Complete Task (+2 Energy)</button>
<br><br>

<h3>Minimum Withdraw: 50,000 Points ($60)</h3>
<button id="withdrawBtn">Withdraw</button>

<script>

let points = 0;
let energy = 0;

function saveState(){
  localStorage.setItem("points", points);
  localStorage.setItem("energy", energy);
}

function loadState(){
  points = parseInt(localStorage.getItem("points")) || 0;
  energy = parseInt(localStorage.getItem("energy")) || 0;
  updateUI();
}

function updateUI(){
  document.getElementById("points").innerText = points;
  document.getElementById("energy").innerText = energy;
}

// TAP BUTTON (ENERGY → POINTS 1:1)
document.getElementById("tapBtn").addEventListener("click", () => {
  if(energy > 0){
    energy -= 1;
    points += 1; // 1 Energy = 1 Point
    saveState();
    updateUI();
  } else {
    alert("No energy! Watch ad or complete task.");
  }
});

// WATCH AD (+2 ENERGY ONLY)
document.getElementById("adBtn").addEventListener("click", () => {
  try{
    const rewardAd = window.Adsgram.init({ blockId: "21545" });

    rewardAd.show().then(res => {
      if(res.done){
        energy += 2; // ONLY ENERGY
        saveState();
        updateUI();
      }
    });

  } catch(e){
    console.log("AdsGram error", e);
  }
});

// COMPLETE TASK (+2 ENERGY ONLY)
document.getElementById("taskBtn").addEventListener("click", () => {
  energy += 2; // ONLY ENERGY
  saveState();
  updateUI();
});

// WITHDRAW
document.getElementById("withdrawBtn").addEventListener("click", () => {
  if(points >= 50000){
    alert("Withdrawal request sent! ($60)");
  } else {
    alert("Minimum withdrawal is 50,000 points ($60)");
  }
});

loadState();

</script>

</body>
</html>
