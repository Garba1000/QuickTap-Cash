<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tap & Earn Safe</title>

<style>
body{
  margin:0;
  padding:20px;
  font-family: Arial;
  background:#0b0b0b;
  color:#fff;
}

h1{font-size:22px}

.section{
  margin-top:18px;
  padding:15px;
  background:#1c1c1c;
  border-radius:10px;
}

.btn{
  display:block;
  margin-top:10px;
  padding:12px;
  background:#f6c445;
  color:#000;
  font-weight:bold;
  text-align:center;
  border-radius:8px;
  cursor:pointer;
}

.btn:active{transform:scale(0.97)}

input,select{
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:6px;
}

/* JOIN POPUP (ONLY ADDITION) */
.join-popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.join-popup h2{
  color:#fff;
  margin-bottom:16px;
}

/* CHANGED TO MAIN INDEX COLOR */
.join-popup button{
  padding:14px 20px;
  font-size:16px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  background:#f6c445;
  color:#000;
  font-weight:bold;
}
</style>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>

</head>

<body>

<h1>⚡ Tap & Earn Safe</h1>

<p>XP Balance: <b id="points">0</b></p>

<div class="section">
  <h2>🎮 Tap System</h2>
  <div class="btn" id="tapBtn">Tap +1 XP</div>
</div>

<div class="section">
  <h2>📺 Reward Ad</h2>
  <div class="btn" id="rewardAdBtn">Watch Ad + Bonus XP</div>
</div>

<div class="section">
  <h2>🎯 Task Mode</h2>
  <div class="btn" id="startTask">Start Task</div>

  <div id="taskArea" style="display:none;">
    <div class="btn" id="runTaskAd">Watch Task Ad</div>
    <div class="btn" id="finishTask">Finish Task</div>
  </div>
</div>

<div class="section">
  <h2>🎁 Daily Bonus</h2>
  <div class="btn" id="dailyBtn">Claim Daily XP</div>
</div>

<div class="section">
  <h2>💳 Withdraw</h2>

  <p>Minimum: 10,000 XP</p>

  <select id="method">
    <option>Litecoin</option>
    <option>USDT</option>
    <option>Payeer</option>
    <option>Bank</option>
  </select>

  <input id="address" placeholder="Wallet"/>
  <input id="amount" type="number" placeholder="Amount"/>

  <div class="btn" id="withdrawBtn">Request Withdraw</div>
</div>

<!-- JOIN POPUP -->
<div class="join-popup" id="joinPopup">
  <h2>Join Our Channel</h2>
  <button id="joinBtn">Join Channel & Get 1 XP</button>
</div>

<script>
const tg = window.Telegram?.WebApp;
tg?.expand?.();

let xp = parseInt(localStorage.getItem("xp") || "0");
let lastDaily = parseInt(localStorage.getItem("daily") || "0");

function update(){
  document.getElementById("points").innerText = xp;
  localStorage.setItem("xp", xp);
}

/* ADSGRAM */
let rewardAd, taskAd;

function initAds(){
  if(typeof Adsgram === "undefined") return;
  rewardAd = Adsgram.init({ blockId: "29216" });
  taskAd = Adsgram.init({ blockId: "29217" });
}

window.addEventListener("load", initAds);

/* PRELOAD AD + JOIN POPUP */
let preloadAd;
const joinPopup = document.getElementById("joinPopup");
const joinBtn = document.getElementById("joinBtn");

function initPreloadAd(){
  if(typeof Adsgram === "undefined") return;
  preloadAd = Adsgram.init({ blockId: "29218" });
}

window.addEventListener("load", async () => {
  initPreloadAd();

  if(!preloadAd) return;

  try{
    await preloadAd.show();
    joinPopup.style.display = "flex";
  }catch(e){
    joinPopup.style.display = "flex";
  }
});

joinBtn.onclick = () => {
  xp += 1;
  update();

  joinPopup.style.display = "none";

  alert("🎉 You earned 1 XP!");

  window.open("https://t.me/yourchannel", "_blank");
};

/* TAP */
let lastTap = 0;
document.getElementById("tapBtn").onclick = () => {
  let now = Date.now();
  if(now - lastTap < 200) return;
  lastTap = now;
  xp += 1;
  update();
};

/* REWARD AD */
document.getElementById("rewardAdBtn").onclick = async () => {
  if(!rewardAd) return alert("Ad not ready");
  try{
    const res = await rewardAd.show();
    if(res?.done){
      xp += 5;
      update();
    }
  }catch(e){}
};

/* TASK */
document.getElementById("startTask").onclick = () => {
  document.getElementById("taskArea").style.display = "block";
};

document.getElementById("runTaskAd").onclick = async () => {
  if(!taskAd) return alert("Task ad not ready");
  try{
    const res = await taskAd.show();
    if(res?.done){
      xp += 3;
      update();
      alert("Task completed!");
    }
  }catch(e){}
};

document.getElementById("finishTask").onclick = () => {
  xp += 5;
  update();
  document.getElementById("taskArea").style.display = "none";
};

/* DAILY */
const DAILY_TASK_BLOCKS = ["task-29250","task-29251","task-29252"];
let dailyIndex = 0;
let dailyRunning = false;

let dailySection = document.getElementById("dailyBtn").parentNode;

let dailyContainer = document.createElement("div");
dailyContainer.style.marginTop = "10px";
dailySection.appendChild(dailyContainer);

let progressText = document.createElement("div");
progressText.style.marginTop = "8px";
progressText.style.fontSize = "14px";

let progressBarWrap = document.createElement("div");
progressBarWrap.style.width = "100%";
progressBarWrap.style.height = "8px";
progressBarWrap.style.background = "#333";
progressBarWrap.style.borderRadius = "6px";
progressBarWrap.style.marginTop = "6px";

let progressBar = document.createElement("div");
progressBar.style.height = "100%";
progressBar.style.width = "0%";
progressBar.style.background = "#f6c445";
progressBar.style.borderRadius = "6px";

progressBarWrap.appendChild(progressBar);
dailySection.appendChild(progressText);
dailySection.appendChild(progressBarWrap);

function updateProgress(){
  progressText.innerText = `Task ${dailyIndex + 1}/3`;
  progressBar.style.width = ((dailyIndex) / 3 * 100) + "%";
}

function loadDailyTask(){
  dailyContainer.innerHTML = "";
  updateProgress();

  const taskEl = document.createElement("adsgram-task");
  taskEl.setAttribute("data-block-id", DAILY_TASK_BLOCKS[dailyIndex]);

  taskEl.addEventListener("reward", () => {
    dailyIndex++;

    if(dailyIndex < DAILY_TASK_BLOCKS.length){
      loadDailyTask();
    } else {
      xp += 1200;
      update();

      alert("🎉 Daily bonus completed!");

      dailyIndex = 0;
      dailyRunning = false;

      lastDaily = Date.now();
      localStorage.setItem("daily", lastDaily);

      dailyContainer.innerHTML = "";
    }
  });

  dailyContainer.appendChild(taskEl);

  if(typeof taskEl.load === "function") taskEl.load();
}

document.getElementById("dailyBtn").onclick = function(){
  let now = Date.now();
  if(now - lastDaily < 86400000){
    return alert("Come back tomorrow");
  }

  if(dailyRunning) return;

  dailyRunning = true;
  dailyIndex = 0;
  loadDailyTask();
};

/* WITHDRAW */
document.getElementById("withdrawBtn").onclick = () => {
  let amount = parseInt(document.getElementById("amount").value);

  if(!amount || amount < 10000){
    return alert("Minimum withdrawal is 10,000 XP");
  }

  if(xp < amount){
    return alert("Not enough XP");
  }

  alert("Withdraw request sent");
};

update();
</script>

</body>
</html>
