<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tap & Earn Game</title>

<style>
body{
  margin:0;
  padding:20px;
  font-family: Arial;
  background:#0c0c0c;
  color:#fff;
}

h1{font-size:22px}

.section{
  margin-top:20px;
  padding:15px;
  background:#1a1a1a;
  border-radius:10px;
}

.btn{
  display:block;
  margin-top:10px;
  padding:12px;
  background:#f6c445;
  color:#000;
  font-weight:bold;
  text-align:center;
  border-radius:8px;
  cursor:pointer;
}

.btn:active{transform:scale(0.97)}

input,select{
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:6px;
}
</style>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>
</head>

<body>

<h1>⚡ Tap & Earn Game</h1>

<p>XP Balance: <span id="points">0</span></p>

<div class="section">
  <h2>🎮 Tap System (XP)</h2>
  <div class="btn" id="tapBtn">Tap +1 XP</div>
</div>

<div class="section">
  <h2>📺 Reward Ads</h2>
  <div class="btn" id="rewardAd">Watch Ad (Bonus XP)</div>
</div>

<div class="section">
  <h2>🎯 Task Mode</h2>
  <div class="btn" id="startTask">Start Tasks</div>

  <div id="taskArea" style="display:none;">
    <div class="btn" id="nextTask">Next Task</div>
    <div class="btn" id="finishTask">Finish Task</div>
  </div>
</div>

<div class="section">
  <h2>🎁 Daily Reward</h2>
  <div class="btn" id="dailyBtn">Claim Daily XP</div>
</div>

<div class="section">
  <h2>💳 Withdraw</h2>

  <p>Minimum: <b>10,000 XP</b></p>

  <select id="method">
    <option>Litecoin</option>
    <option>USDT</option>
    <option>Payeer</option>
    <option>Bank</option>
  </select>

  <input id="address" placeholder="Wallet"/>
  <input id="amount" type="number" placeholder="Amount"/>

  <div class="btn" id="withdrawBtn">Request Withdraw</div>
</div>

<script>
const tg = Telegram.WebApp;

let xp = parseInt(localStorage.getItem("xp") || "0");

function update(){
  document.getElementById("points").innerText = xp;
  localStorage.setItem("xp", xp);
}

/* =========================
   ADSGRAM BLOCKS
========================= */
const rewardAd = Adsgram.init({ blockId: "26796" });
const taskAd1 = Adsgram.init({ blockId: "27333" });
const taskAd2 = Adsgram.init({ blockId: "27334" });
const taskAd3 = Adsgram.init({ blockId: "27335" });

/* =========================
   TAP SYSTEM (SAFE XP ONLY)
========================= */
let lastTap = 0;

document.getElementById("tapBtn").onclick = () => {
  let now = Date.now();

  if(now - lastTap < 150){
    return;
  }

  lastTap = now;

  xp += 1;
  update();
};

/* =========================
   REWARD AD
========================= */
document.getElementById("rewardAd").onclick = async () => {
  try {
    const res = await rewardAd.show();

    if(res && res.done){
      xp += 5;
      update();
      alert("Bonus XP added!");
    }
  } catch(e){}
};

/* =========================
   TASK SYSTEM
========================= */
let index = 0;
const tasks = [taskAd1, taskAd2, taskAd3];

document.getElementById("startTask").onclick = () => {
  index = 0;
  document.getElementById("taskArea").style.display = "block";
};

document.getElementById("nextTask").onclick = async () => {
  if(index >= tasks.length){
    alert("No more tasks");
    return;
  }

  const res = await tasks[index].show();

  if(res && res.done){
    xp += 3;
    index++;
    update();
  }
};

document.getElementById("finishTask").onclick = async () => {
  const res = await rewardAd.show();

  if(res && res.done){
    xp += 10;
    update();
  }

  document.getElementById("taskArea").style.display = "none";
};

/* =========================
   DAILY BONUS
========================= */
let lastDaily = localStorage.getItem("daily") || 0;

document.getElementById("dailyBtn").onclick = () => {
  let now = Date.now();

  if(now - lastDaily < 86400000){
    alert("Come back tomorrow");
    return;
  }

  xp += 20;
  lastDaily = now;
  localStorage.setItem("daily", lastDaily);

  update();
};

/* =========================
   WITHDRAW (REQUEST ONLY)
========================= */
document.getElementById("withdrawBtn").onclick = () => {
  let amount = parseInt(document.getElementById("amount").value);

  if(!amount || amount < 10000){
    alert("Minimum withdrawal is 10,000 XP");
    return;
  }

  if(xp < amount){
    alert("Not enough XP");
    return;
  }

  alert("Withdraw request submitted for review");

  console.log({
    method: document.getElementById("method").value,
    address: document.getElementById("address").value,
    amount
  });
};

update();
</script>

</body>
</html>
