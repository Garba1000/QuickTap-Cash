<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tap & Earn Pro</title>

<style>
body{
  font-family: Arial;
  background:#0d0d0d;
  color:#fff;
  margin:0;
  padding:20px;
}
h1{font-size:22px}

.section{
  margin-top:20px;
  padding:15px;
  background:#1a1a1a;
  border-radius:10px;
}

.btn{
  display:block;
  margin-top:10px;
  padding:12px;
  background:#f5c542;
  color:#000;
  font-weight:bold;
  border-radius:8px;
  text-align:center;
  cursor:pointer;
}

.btn:active{transform:scale(0.97)}

input,select{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:6px;
  border:none;
}
</style>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>
</head>

<body>

<h1>⚡ Tap & Earn Pro</h1>

<p>Balance: <span id="points">0</span> Points</p>

<div class="section">
  <h2>📺 Reward Ads</h2>
  <div class="btn" id="adReward">Watch Ad & Earn 5 Points</div>
</div>

<div class="section">
  <h2>🎯 Task Ads</h2>
  <div class="btn" id="startTask">Start Task Ads</div>

  <div id="taskBox" style="display:none;">
    <div class="btn" id="taskNext">Next Task</div>
    <div class="btn" id="taskFinish">Finish Tasks</div>
  </div>
</div>

<div class="section">
  <h2>🎁 Daily Bonus</h2>
  <div class="btn" id="daily">Claim Daily (+20)</div>
</div>

<div class="section">
  <h2>💳 Withdraw</h2>

  <p>Minimum: <b>10,000 points</b></p>

  <select id="method">
    <option>Litecoin</option>
    <option>USDT</option>
    <option>Payeer</option>
    <option>Bank</option>
  </select>

  <input id="address" placeholder="Wallet"/>
  <input id="amount" type="number" placeholder="Amount"/>

  <div class="btn" id="withdraw">Request Withdraw</div>
</div>

<script>
const tg = Telegram.WebApp;
let points = parseInt(localStorage.getItem("points") || "0");

function update(){
  document.getElementById("points").innerText = points;
  localStorage.setItem("points", points);
}

/* =========================
   ADSGRAM BLOCK IDS
========================= */

// Reward ads
const rewardAd = Adsgram.init({ blockId: "26796" });

// Task ads (you can add more)
const taskAd1 = Adsgram.init({ blockId: "27333" });
const taskAd2 = Adsgram.init({ blockId: "27334" });
const taskAd3 = Adsgram.init({ blockId: "27335" });

/* =========================
   REWARDED AD (SAFE)
========================= */
document.getElementById("adReward").onclick = async () => {
  try {
    const res = await rewardAd.show();

    if(res && res.done){
      points += 5;
      update();
      alert("Reward added!");
    }
  } catch(e){}
};

/* =========================
   TASK SYSTEM
========================= */
let taskIndex = 0;
const tasks = [taskAd1, taskAd2, taskAd3];

document.getElementById("startTask").onclick = async () => {
  taskIndex = 0;
  document.getElementById("taskBox").style.display = "block";

  alert("Task started. Watch ads to continue.");
};

document.getElementById("taskNext").onclick = async () => {
  if(taskIndex >= tasks.length - 1){
    alert("No more tasks");
    return;
  }

  const res = await tasks[taskIndex].show();

  if(res && res.done){
    points += 3;
    taskIndex++;
    update();
  }
};

document.getElementById("taskFinish").onclick = async () => {
  const res = await rewardAd.show();

  if(res && res.done){
    points += 10;
    update();
    alert("Task completed bonus added!");
  }

  document.getElementById("taskBox").style.display = "none";
};

/* =========================
   DAILY BONUS
========================= */
let lastDaily = localStorage.getItem("daily") || 0;

document.getElementById("daily").onclick = () => {
  let now = Date.now();

  if(now - lastDaily < 86400000){
    alert("Come back tomorrow");
    return;
  }

  points += 20;
  lastDaily = now;
  localStorage.setItem("daily", lastDaily);

  update();
};

/* =========================
   WITHDRAW (SAFE)
========================= */
document.getElementById("withdraw").onclick = () => {
  let amount = parseInt(document.getElementById("amount").value);

  if(!amount || amount < 10000){
    alert("Minimum is 10,000 points");
    return;
  }

  if(points < amount){
    alert("Not enough balance");
    return;
  }

  alert("Withdraw request sent for review");

  console.log({
    method: document.getElementById("method").value,
    address: document.getElementById("address").value,
    amount
  });
};

update();
</script>

</body>
</html>
